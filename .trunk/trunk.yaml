---
# Optional breadth sweeper (make lint-trunk) — NOT the gate; `make verify`
# runs the native ruff/yamllint/markdownlint/pre-commit stack.
# See https://docs.trunk.io/reference/trunk-yaml
version: 0.1
cli:
  version: 1.25.0
plugins:
  sources:
    - id: trunk
      ref: v1.10.2
      uri: https://github.com/trunk-io/plugins
runtimes:
  enabled:
    - go@1.21.0
    - node@22.16.0
    - python@3.14.4
lint:
  enabled:
    - checkov@3.3.8
    - git-diff-check
    - markdownlint@0.49.0
    - ruff@0.15.20
    - shellcheck@0.11.0
    - shfmt@3.6.0
    - taplo@0.10.0
    - trufflehog@3.95.8
    - yamllint@1.38.0
  disabled:
    # ruff (config in pyproject.toml) owns Python lint+format+import-sort
    # and the S security rules; don't run the same jobs twice.
    - bandit
    - black
    - isort
    # prettier's markdown/YAML opinions fight the hand-wrapped 80-col docs
    # and block-style YAML.
    - prettier
  ignore:
    - linters: [markdownlint]
      paths:
        # agent prompt files (frontmatter + body), not docs — mirrors
        # .markdownlintignore, which trunk's markdownlint doesn't read
        - .claude/agents/**
actions:
  enabled:
    - trunk-upgrade-available

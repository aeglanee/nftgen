# Common early scrubbing — drop obviously-bad packets. Shared by all routers,
# pulled into a raw-priority chain. Shows both structured rules (bogon address
# drops) and the `raw:` escape hatch (TCP-flag matching, which has no structured
# key yet — full nft power when the schema doesn't cover something).
rules:
  # --- bogon source/destination drops (structured) ---
  - saddr: bogon_ipv4
    counter: true
    action: drop
  - daddr: bogon_ipv4
    counter: true
    action: drop

  # --- invalid TCP flag combinations (raw nft, the escape hatch) ---
  - raw: "tcp flags & (fin|syn|rst|psh|ack|urg) == 0x0 counter drop"   # null scan
  - raw: "tcp flags & (fin|syn) == (fin|syn) counter drop"             # syn+fin
  - raw: "tcp flags & (fin|rst) == (fin|rst) counter drop"             # fin+rst
  - raw: "tcp flags & (fin|ack) == fin counter drop"                   # fin without ack

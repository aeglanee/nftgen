---
# users -> transit (toward the other sites). The one fleet-wide central
# service: any site's users may reach the HQ directory over transit. Branch
# users leave here; at HQ this pair is unused (harmless) since HQ users reach
# the directory locally.
rules:
  - saddr: all_users
    daddr: hq_central
    proto: tcp
    dport: ldaps
    action: accept
  - raw: >-
      update @log_meter { ip saddr timeout 1m limit rate 4/minute }
      log prefix "fwd-users-transit-drop " level info
  - counter: policy_drops
    action: drop

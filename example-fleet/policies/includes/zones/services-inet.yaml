---
# services -> internet (egress). Servers fetch updates (web) and use DNS/NTP;
# nothing else leaves.
rules:
  - saddr: local_services
    proto: tcp
    dport: web
    action: accept
  - saddr: local_services
    proto: udp
    dport: dns
    action: accept
  - saddr: local_services
    proto: udp
    dport: ntp
    action: accept
  - raw: >-
      update @log_meter { ip saddr timeout 1m limit rate 4/minute }
      log prefix "fwd-services-inet-drop " level info
  - counter: policy_drops
    action: drop

---
# netmgmt -> transit. The HQ monitor scrapes every site's exporters over the
# transit link — one collector, per-site pull. Only the metrics port, only
# from the monitor host. At branches this pair is unused.
rules:
  - saddr: hq_monitor
    daddr: all_services
    proto: tcp
    dport: metrics
    action: accept
  - meter:
      set: log_meter
      key: saddr
      rate: 4/minute
      timeout: 1m
    log:
      prefix: "fwd-nwm-transit-drop "
      level: info
  - counter: policy_drops
    action: drop

---
# dmz -> internet (egress). Public hosts answer inbound (handled by ct
# established) and only need DNS/NTP + web for updates outbound.
rules:
  - saddr: local_dmz
    proto: udp
    dport: dns
    action: accept
  - saddr: local_dmz
    proto: udp
    dport: ntp
    action: accept
  - saddr: local_dmz
    proto: tcp
    dport: web
    action: accept
  - meter:
      set: log_meter
      key: saddr
      rate: 4/minute
      timeout: 1m
    log:
      prefix: "fwd-dmz-inet-drop "
      level: info
  - counter: policy_drops
    action: drop

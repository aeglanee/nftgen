# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
---
name: ci

# yamllint disable-line rule:truthy
on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: lint + tests + nft -c
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install nftables + iproute2 (for nft -c and the netns harness)
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends nftables iproute2

      - name: Install dev dependencies
        run: |
          set -euo pipefail
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e '.[dev]'

      # Ubuntu 24.04 restricts unprivileged user namespaces via AppArmor, which
      # blocks the rootless `unshare -rn nft -c` path and the netns harness.
      # Re-enable them so `nft -c` and the behavioral suite actually run.
      - name: Enable unprivileged user namespaces
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
          sudo sysctl -w kernel.unprivileged_userns_clone=1 || true

      - name: Lint (ruff / yamllint / markdownlint / gitleaks)
        run: make lint

      # Fail loud if the runner can't run nft -c — otherwise the nft-dependent
      # and behavioral tests would silently skip and we'd lose that coverage.
      - name: Assert nft -c + netns are usable
        run: |
          set -euo pipefail
          .venv/bin/python - <<'PY'
          from nftgen import validate
          from tests.behavioral.netns import can_netns
          assert validate.nft_available(), "nft binary not on PATH"
          assert validate.can_check(), "nft -c not usable (no netlink and no userns)"
          assert can_netns(), "netns harness unusable — behavioral tests would skip"
          print("nft -c and netns both usable")
          PY

      - name: Tests (unit + golden + nft -c + behavioral netns)
        run: make test

      - name: Build examples + nft -c
        run: |
          set -euo pipefail
          .venv/bin/nftgen build example --check
          .venv/bin/nftgen build example-fleet --check

      - name: Drift gate (committed artifacts reproduce from source)
        run: |
          set -euo pipefail
          .venv/bin/nftgen build example-fleet
          git diff --exit-code -- example-fleet/generated \
            || { echo "::error::example-fleet/generated is stale — regenerate and commit"; exit 1; }

---
# dmz -> internet (egress). Public hosts answer inbound (handled by ct
# established) and only need DNS/NTP + web for updates outbound.
rules:
  - saddr: local_dmz
    proto: udp
    dport: dns
    action: accept
  - saddr: local_dmz
    proto: udp
    dport: ntp
    action: accept
  - saddr: local_dmz
    proto: tcp
    dport: web
    action: accept
  - raw: >-
      update @log_meter { ip saddr timeout 1m limit rate 4/minute }
      log prefix "fwd-dmz-inet-drop " level info
  - counter: policy_drops
    action: drop

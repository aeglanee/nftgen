---
# HQ site router (site1). The site's HA pair (r1/r2) runs this identical
# policy; VRRP/conntrackd are the platform's job, not the firewall's. All
# three site routers share this exact structure — only `site:` differs, and
# the site overlay resolves every `local_*` name to this site's subnets.
site: hq
tables:
  - family: inet
    name: filter
    counters:
      - ct_invalid
      - bogon_drops
      - bad_tcp
      - blocklist_drops
      - policy_drops
    flowtables:
      - name: ft
        devices: [wan, transit_if, users_if, services_if, dmz_if]
    sets:
      - include: includes/sets/scrub-sets.yaml
    chains:
      # ---- base chains ----
      - name: input
        hook: input
        type: filter
        priority: filter
        policy: drop
        rules:
          - ct: [established, related]
            action: accept
          - ct: [invalid]
            counter: ct_invalid
            action: drop
          - iifname: lo_if
            action: accept
          # malformed tcp flags are illegal on any interface (packet-validity,
          # not address hygiene) — scrub them here too, not just on wan
          - proto: tcp
            action:
              jump: tcp_scrub
          - include: includes/common/icmp.yaml
          - include: includes/zones/input-local.yaml

      - name: forward
        hook: forward
        type: filter
        priority: filter
        policy: drop
        rules:
          - include: includes/common/conntrack.yaml
          # malformed tcp flags: illegal from any interface (packet-validity),
          # so scrubbed unconditionally — the proto gate keeps non-tcp out.
          - proto: tcp
            action:
              jump: tcp_scrub
          # bogon sources: address-legitimacy, so wan-only — one interface
          # test gates the whole block (non-wan traffic skips it).
          - iifname: wan
            action:
              jump: wan_scrub
          - include: includes/common/blocklist.yaml
          - include: includes/common/icmp.yaml
          # one lookup dispatches each (in, out) interface pair to its chain
          - vmap:
              key: [iifname, oifname]
              map:
                - match: [users_if, services_if]
                  jump: fwd_users_services
                - match: [users_if, dmz_if]
                  jump: fwd_users_dmz
                - match: [users_if, wan]
                  jump: fwd_users_inet
                - match: [users_if, transit_if]
                  jump: fwd_users_transit
                - match: [services_if, wan]
                  jump: fwd_services_inet
                - match: [dmz_if, wan]
                  jump: fwd_dmz_inet
                - match: [nwm_if, services_if]
                  jump: fwd_nwm_services
                - match: [nwm_if, transit_if]
                  jump: fwd_nwm_transit
                - match: [transit_if, services_if]
                  jump: fwd_transit_services
                - match: [transit_if, dmz_if]
                  jump: fwd_transit_dmz
                - match: [wan, dmz_if]
                  jump: fwd_wan_dmz
          - include: includes/common/fwd-catchall.yaml

      # ---- scrub chains (regular) ----
      # malformed tcp flags — all-interface (jumped from input + forward)
      - name: tcp_scrub
        rules:
          - include: includes/common/bad-tcp.yaml
      # bogon sources — wan-only (jumped from forward on iifname wan)
      - name: wan_scrub
        rules:
          - include: includes/common/scrub-wan.yaml

      # ---- per-pair zone chains (regular; reached by the vmap) ----
      - name: fwd_users_services
        rules:
          - include: includes/zones/users-services.yaml
      - name: fwd_users_dmz
        rules:
          - include: includes/zones/users-dmz.yaml
      - name: fwd_users_inet
        rules:
          - include: includes/zones/users-inet.yaml
      - name: fwd_users_transit
        rules:
          - include: includes/zones/users-transit.yaml
      - name: fwd_services_inet
        rules:
          - include: includes/zones/services-inet.yaml
      - name: fwd_dmz_inet
        rules:
          - include: includes/zones/dmz-inet.yaml
      - name: fwd_nwm_services
        rules:
          - include: includes/zones/nwm-services.yaml
      - name: fwd_nwm_transit
        rules:
          - include: includes/zones/nwm-transit.yaml
      - name: fwd_transit_services
        rules:
          - include: includes/zones/transit-services.yaml
      - name: fwd_transit_dmz
        rules:
          - include: includes/zones/transit-dmz.yaml
      - name: fwd_wan_dmz
        rules:
          - include: includes/zones/wan-dmz.yaml

  - family: inet
    name: nat
    chains:
      - name: prerouting
        hook: prerouting
        type: nat
        priority: dstnat
        policy: accept
        rules:
          # publish the site's web service: inbound :80/:443 -> the dmz host
          - iifname: wan
            proto: tcp
            dport: web
            action:
              dnat: local_dmz_web
      - name: postrouting
        hook: postrouting
        type: nat
        priority: srcnat
        policy: accept
        rules:
          # multi-WAN egress: masquerade out whichever uplink routing picks
          - oifname: wan
            action: masquerade

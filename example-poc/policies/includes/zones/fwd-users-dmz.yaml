---
# Users to the DMZ: the published services plus admin ssh. local_dmz only
# exists in site1's overlay — a site2 host including this would fail its
# build, which is the point (you can't reference a zone your site lacks).
rules:
  - saddr: local_users
    daddr: local_dmz
    proto: tcp
    dport: web
    action: accept
  - saddr: admins
    daddr: local_dmz
    proto: tcp
    dport: ssh
    action: accept

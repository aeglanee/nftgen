---
# users -> local dmz. Only the public web service; the dmz is otherwise
# isolated from the user vlan.
rules:
  - saddr: local_users
    daddr: local_dmz
    proto: tcp
    dport: web
    action: accept
  - meter:
      set: log_meter
      key: saddr
      rate: 4/minute
      timeout: 1m
    log:
      prefix: "fwd-users-dmz-drop "
      level: info
  - counter: policy_drops
    action: drop

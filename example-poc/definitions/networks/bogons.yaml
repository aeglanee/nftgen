---
# Martian/bogon sources for WAN-ingress scrubbing. Named sets are
# single-family by design — split _v4/_v6, never mixed.
networks:
  bogons_v4:
    - 0.0.0.0/8
    - 10.0.0.0/8
    - 100.64.0.0/10
    - 127.0.0.0/8
    - 169.254.0.0/16
    - 172.16.0.0/12
    - 192.0.2.0/24
    - 192.168.0.0/16
    - 198.18.0.0/15
    - 224.0.0.0/4
    - 240.0.0.0/4
  bogons_v6:
    - ::/128
    - ::1/128
    - ::ffff:0:0/96
    - 2001:db8::/32
    - fc00::/7
    - fe80::/10
    - ff00::/8

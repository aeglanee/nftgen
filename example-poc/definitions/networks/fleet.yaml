---
# Fleet-wide topology, visible to every host. Two naming planes:
#   siteN_*  — a specific site's subnets (building blocks)
#   all_*    — fleet compositions shared rules reference
# A host additionally sees its own site as local_* via sites/<site>.yaml —
# local_* means "this site", all_* means "everywhere".
networks:
  site1_mgmt: [10.10.10.0/24]
  site1_users: [10.10.20.0/24]
  site1_servers: [10.10.30.0/24]
  site1_iot: [10.10.50.0/24]
  site2_mgmt: [10.20.10.0/24]
  site2_users: [10.20.20.0/24]
  site2_servers: [10.20.30.0/24]
  site2_iot: [10.20.50.0/24]

  all_users:
    - site1_users
    - site2_users
  all_servers:
    - site1_servers
    - site2_servers

  # Fleet hosts referenced by shared rules regardless of site.
  admins:
    - 10.10.10.5
    - 10.20.10.5
  monitors:
    - 10.10.30.20
    - 10.20.30.20

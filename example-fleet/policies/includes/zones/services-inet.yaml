---
# services -> internet (egress). Servers fetch updates (web) and use DNS/NTP;
# nothing else leaves.
rules:
  - saddr: local_services
    proto: tcp
    dport: web
    action: accept
  - saddr: local_services
    proto: udp
    dport: dns
    action: accept
  - saddr: local_services
    proto: udp
    dport: ntp
    action: accept
  - meter:
      set: log_meter
      key: saddr
      rate: 4/minute
      timeout: 1m
    log:
      prefix: "fwd-services-inet-drop "
      level: info
  - counter: policy_drops
    action: drop

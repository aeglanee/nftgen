---
# Coherent service groups (best-practices §7): one name = one service's ports,
# no grab-bags. Rules state the proto; a service only contributes the ports
# that match it (dns under `proto: udp` emits only the udp port).
# `mgmt_services` composes services, same as networks compose.
services:
  web: [80/tcp, 443/tcp]
  dns: [53/udp, 53/tcp]
  ntp: [123/udp]
  dhcp: [67/udp, 68/udp]
  ssh: [22/tcp]
  snmp: [161/udp]
  node_exporter: [9100/tcp]
  mgmt_services:
    - ssh
    - snmp

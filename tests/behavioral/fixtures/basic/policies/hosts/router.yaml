---
# Minimal stateful router: input serves ssh to the LAN only; forward allows
# exactly lan->wan:testsvc. `open_unused` is accepted but has no listener —
# it must probe as *refused*, proving the harness distinguishes a firewall
# drop (timeout) from a closed port (refused).
tables:
  - family: inet
    name: filter
    counters:
      - invalid_hits
    chains:
      - name: input
        hook: input
        type: filter
        priority: filter
        policy: drop
        rules:
          - ct: [established, related]
            action: accept
          - ct: [invalid]
            counter: invalid_hits
            action: drop
          - iifname: lan_if
            saddr: lan_net
            proto: tcp
            dport: ssh
            action: accept
          - iifname: lan_if
            saddr: lan_net
            proto: tcp
            dport: open_unused
            action: accept

      - name: forward
        hook: forward
        type: filter
        priority: filter
        policy: drop
        rules:
          - ct: [established, related]
            action: accept
          - ct: [invalid]
            counter: invalid_hits
            action: drop
          - iifname: lan_if
            oifname: wan_if
            saddr: lan_net
            proto: tcp
            dport: testsvc
            action: accept

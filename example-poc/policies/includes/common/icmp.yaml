---
# Family-correct ICMP policy. Echo is rate-limited rather than blocked;
# unreachable/PMTUD/ND control traffic must never be dropped. `icmp-type` is
# family-aware — the proto (icmp vs icmpv6) scopes each rule.
rules:
  - proto: icmp
    icmp-type: echo-request
    limit: 5/second
    action: accept
  - proto: icmp
    icmp-type: [destination-unreachable, time-exceeded, parameter-problem]
    action: accept
  - proto: icmpv6
    icmp-type: echo-request
    limit: 5/second
    action: accept
  - proto: icmpv6
    icmp-type:
      - nd-neighbor-solicit
      - nd-neighbor-advert
      - nd-router-solicit
      - nd-router-advert
      - packet-too-big
      - time-exceeded
      - parameter-problem
    action: accept

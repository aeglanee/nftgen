# Common early scrubbing — drop obviously-bad packets. Shared by all routers,
# pulled into a raw-priority chain. All structured (the TCP-flag combos use the
# `flags:` key, list form — each clause renders one drop line).
rules:
  # --- bogon source/destination drops ---
  - saddr: bogon_ipv4
    counter: true
    action: drop
  - daddr: bogon_ipv4
    counter: true
    action: drop

  # --- invalid TCP flag combinations ---
  - flags:
      - match: none          # null scan
        mask: all
      - match: [fin, syn]    # syn+fin
        mask: [fin, syn]
      - match: [fin, rst]    # fin+rst
        mask: [fin, rst]
      - match: [fin]         # fin without ack
        mask: [fin, ack]
    counter: true
    action: drop

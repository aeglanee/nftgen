---
# users -> local dmz. Only the public web service; the dmz is otherwise
# isolated from the user vlan.
rules:
  - saddr: local_users
    daddr: local_dmz
    proto: tcp
    dport: web
    action: accept
  - raw: >-
      update @log_meter { ip saddr timeout 1m limit rate 4/minute }
      log prefix "fwd-users-dmz-drop " level info
  - counter: policy_drops
    action: drop

---
# The forward leg of the WAN port-forwards. Prerouting dnat already rewrote
# daddr to the inside host, so forward sees the real target — allowlist
# exactly the published services, per host.
rules:
  - daddr: local_dmz_web
    proto: tcp
    dport: web
    action: accept
  - daddr: local_dmz_jump
    proto: tcp
    dport: ssh
    action: accept

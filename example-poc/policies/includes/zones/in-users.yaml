---
# What user LANs may ask of the router itself: name resolution, leases, time.
# The dhcp rule carries no saddr — DISCOVER arrives from 0.0.0.0.
rules:
  - saddr: local_users
    proto: udp
    dport: dns
    action: accept
  - saddr: local_users
    proto: tcp
    dport: dns
    action: accept
  - proto: udp
    dport: dhcp
    action: accept
  - saddr: local_users
    proto: udp
    dport: ntp
    action: accept

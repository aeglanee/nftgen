---
# End of the forward base chain: traffic whose (iifname, oifname) pair isn't
# in the dispatch vmap lands here. Metered log (per-source, so one noisy host
# can't flood the log) names it as an unmatched pair, then a counted drop.
# The verdict is a separate rule from the log (§8b left-to-right gating).
rules:
  - meter:
      set: log_meter
      key: saddr
      rate: 4/minute
      timeout: 1m
    log:
      prefix: "fwd-nomatch-drop "
      level: info
  - counter: policy_drops
    action: drop

---
# users -> internet (egress). Web + DNS + NTP out; masqueraded in the nat
# table. Everything else the site's users try outbound is dropped + logged.
rules:
  - saddr: local_users
    proto: tcp
    dport: web
    action: accept
  - saddr: local_users
    proto: udp
    dport: dns
    action: accept
  - saddr: local_users
    proto: tcp
    dport: dns
    action: accept
  - saddr: local_users
    proto: udp
    dport: ntp
    action: accept
  - raw: >-
      update @log_meter { ip saddr timeout 1m limit rate 4/minute }
      log prefix "fwd-users-inet-drop " level info
  - counter: policy_drops
    action: drop

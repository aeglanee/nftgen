---
# poc-gw1 — site1 border router, the best-practice showcase host.
# Input + forward + nat; zone dispatch via vmaps; every construct is narrated
# in ../../README.md with pointers into docs/best-practices.md and docs/maps.md.
site: site1

tables:
  - family: inet
    name: filter

    # Named counters make scrub activity observable (`nft list counters`).
    counters:
      - bogon_drops
      - bad_tcp

    sets:
      - include: includes/common/sets-bogons.yaml
      # Live blocklist: starts empty, fed at runtime
      # (`nft add element inet filter blocklist { <ip> timeout 10m }`).
      # Single-family by design — a v6 twin would be blocklist_v6.
      - name: blocklist
        type: ipv4_addr
        flags: [timeout]
      # Paired flows (best-practices §2b): exact monitor→exporter tuples.
      # A concat set matches pairs, so mon may scrape web and jump — but no
      # cartesian bleed: nothing else on those ports, no other sources.
      - name: mon_flows
        concat: [saddr, daddr, dport]
        proto: tcp
        tuples:
          - [local_mon, local_dmz_web, node_exporter]
          - [local_mon, local_dmz_jump, node_exporter]

    flowtables:
      - name: ft
        hook: ingress
        priority: 0
        devices: [users, servers, dmz, transit]

    chains:
      - name: input
        hook: input
        type: filter
        priority: filter
        policy: drop
        rules:
          - iif: loopback
            action: accept
          - include: includes/common/conntrack.yaml
          - saddr: "@blocklist"
            counter: true
            action: drop
          - include: includes/common/icmp.yaml
          # Zone dispatch: one vmap, one chain per zone (docs/maps.md).
          # iot has no entry on purpose — an unlisted zone falls straight
          # to the chain policy (drop). uplinks expands to both devices.
          - vmap:
              key: iif
              map:
                mgmt:
                  jump: in_mgmt
                users:
                  jump: in_users
                servers:
                  jump: in_servers
                uplinks:
                  jump: in_wan

      - name: in_mgmt
        rules:
          - include: includes/zones/in-mgmt.yaml
      - name: in_users
        rules:
          - include: includes/zones/in-users.yaml
      - name: in_servers
        rules:
          - include: includes/zones/in-servers.yaml
      - name: svc_ssh
        rules:
          - include: includes/zones/svc-ssh.yaml
      - name: svc_mon
        rules:
          - include: includes/zones/svc-mon.yaml
      - name: in_wan
        rules:
          - include: includes/common/wan-bogons.yaml

      - name: forward
        hook: forward
        type: filter
        priority: filter
        policy: drop
        rules:
          # Established flows offload to the flowtable and skip the ruleset.
          - ct: [established, related]
            flow-offload: ft
            action: accept
          - ct: [invalid]
            action: drop
          - include: includes/common/bad-tcp.yaml
          - saddr: "@blocklist"
            counter: true
            action: drop
          - include: includes/common/wan-bogons.yaml
          # Paired-flow allowlist rides ahead of the zone dispatch.
          - set: mon_flows
            action: accept
          # Zone-pair dispatch (concat vmap over iif . oif): enumerate the
          # *meaningful* pairs, let every other combination fall to the drop
          # policy. Rows with `uplinks` expand over both member devices.
          - vmap:
              key: [iif, oif]
              map:
                - match: [users, uplinks]
                  jump: fwd_users_inet
                - match: [servers, uplinks]
                  jump: fwd_servers_inet
                - match: [iot, uplinks]
                  jump: fwd_iot_inet
                - match: [mgmt, uplinks]
                  jump: fwd_mgmt_inet
                - match: [users, servers]
                  jump: fwd_users_servers
                - match: [users, dmz]
                  jump: fwd_users_dmz
                - match: [uplinks, dmz]
                  jump: fwd_inet_dmz
                - match: [users, transit]
                  jump: fwd_xsite
                - match: [transit, servers]
                  jump: fwd_xsite
                - match: [transit, dmz]
                  jump: fwd_xsite

      - name: fwd_users_inet
        rules:
          - include: includes/zones/fwd-users-inet.yaml
      - name: fwd_servers_inet
        rules:
          - include: includes/zones/fwd-servers-inet.yaml
      - name: fwd_iot_inet
        rules:
          - include: includes/zones/fwd-iot-inet.yaml
      - name: fwd_mgmt_inet
        rules:
          - include: includes/zones/fwd-mgmt-inet.yaml
      - name: fwd_users_servers
        rules:
          - include: includes/zones/fwd-users-servers.yaml
      - name: fwd_users_dmz
        rules:
          - include: includes/zones/fwd-users-dmz.yaml
      - name: fwd_inet_dmz
        rules:
          - include: includes/zones/fwd-inet-dmz.yaml
      - name: fwd_xsite
        rules:
          - include: includes/zones/fwd-xsite.yaml

  - family: inet
    name: nat
    chains:
      - name: prerouting
        hook: prerouting
        type: nat
        priority: dstnat
        policy: accept
        rules:
          # Port-forward data map (docs/maps.md): WAN service port → inside
          # host, one rule. Targets are single-address groups from the site
          # overlay. Unmapped ports fall through untouched — forward drops them.
          - iif: uplinks
            action:
              dnat:
                proto: tcp
                map:
                  80: local_dmz_web
                  443: local_dmz_web
                  2222: local_dmz_jump
      - name: postrouting
        hook: postrouting
        type: nat
        priority: srcnat
        policy: accept
        rules:
          # Static egress NAT: site1 has a fixed address, so snat (not
          # masquerade) — the per-site value lives behind local_snat_ip.
          - oif: uplinks
            saddr: local_site
            action:
              snat: local_snat_ip

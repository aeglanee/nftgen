---
# User egress allowlist: web + dns + ntp; everything else falls to the forward
# chain's drop policy. Allowlist the flows, let the policy do the denying.
rules:
  - saddr: local_users
    proto: tcp
    dport: web
    action: accept
  - saddr: local_users
    proto: udp
    dport: dns
    action: accept
  - saddr: local_users
    proto: udp
    dport: ntp
    action: accept

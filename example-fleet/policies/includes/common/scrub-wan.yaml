---
# WAN-ingress bogon scrub — the `wan_scrub` chain body, reached by
# `iifname wan jump wan_scrub`. Martian / rfc1918 sources are illegal *from
# the internet*, but our own LANs use rfc1918 — so this is address-legitimacy
# hygiene and must stay wan-scoped (all-interface would drop internal traffic).
# Contract: declare the scrub sets + the `bogon_drops` counter.
rules:
  - saddr: "@bogons_v4"
    counter: bogon_drops
    action: drop
  - saddr: "@bogons_v6"
    counter: bogon_drops
    action: drop
